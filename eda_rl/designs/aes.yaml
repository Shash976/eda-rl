# designs/aes.yaml — AES-128 encryption core (the ORFS reference `aes` design).
#
# Larger pure-std-cell design than gcd (real logic depth from the cipher/key
# schedule), no RTL params, no functional hook. A second real design (after
# gcd) proving the design-agnostic optimizer on a bigger, more representative
# block. top != name (aes_cipher_top vs aes) — DESIGN_NAME/DESIGN_NICKNAME
# must stay split for this design; see AGENTS.md.
#
# Unlike gcd.yaml, this design is NOT self-contained: rtl_files are absolute
# paths into the ORFS install (not vendored in this repo), so a machine
# without ORFS_DIR=/opt/OpenROAD-flow-scripts (or an equivalent checkout at
# these paths) cannot resolve them.

name: aes
top:  aes_cipher_top

rtl_files:
  # NOT vendored — absolute paths into the ORFS-shipped aes RTL. Requires an
  # OpenROAD-flow-scripts checkout at this path (or EDA_RL_DESIGN_ROOT set
  # accordingly); unlike gcd.yaml, editing this file alone does not make the
  # example portable to a machine without ORFS installed.
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_cipher_top.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_inv_cipher_top.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_inv_sbox.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_key_expand_128.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_rcon.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/aes_sbox.v
  - /opt/OpenROAD-flow-scripts/flow/designs/src/aes/timescale.v


clock_port: clk

# No RTL chparam axes (aes has no configurable parameters).
params: {}

# Clock ranges below are aes-specific (wider/slower than gcd's, reflecting the
# cipher's deeper combinational logic); not derived from an AutoTuner
# canonical range the way gcd.yaml's is — set for relaxed exploration on both
# platforms.
platforms:
  nangate45:
    clock_range_ns: [0.7, 2.0]
    default_clock_ns: 1.0
  asap7:
    clock_range_ns: [0.3, 1.0]
    default_clock_ns: 0.4
# has_macros: false — aes is a pure std-cell design (no SRAM/macro instances).
has_macros: false

# functional_eval: none — aes has no behavioral simulation hook; correctness
# relies on the RTL being bit-exact verified upstream (ORFS reference design).
# F0 is legality/validate_config only; F1 is skipped (functional_eval.kind != tinyvad_sim).
functional_eval:
  kind: none
