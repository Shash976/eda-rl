# designs/gcd.yaml — self-contained example design (GCD, the ORFS reference).
#
# Tiny pure-std-cell design (~200 cells), no RTL params, no functional hook.
# Used as the smoke-test / proof-of-generality for the design-agnostic optimizer.
# The RTL is vendored at designs/gcd/gcd.v (copied from the ORFS reference), so
# this example needs no external paths.
#
# nangate45 reference: CORE_UTILIZATION=55, clk_period 0.46 ns (Fmax ~2.17 GHz target).

name: gcd
top:  gcd

rtl_files:
  # Vendored copy of the ORFS-shipped gcd.v; relative path resolves against this
  # YAML's own directory, so the example is fully self-contained.
  - gcd/gcd.v

clock_port: clk

# No RTL chparam axes (gcd has no configurable parameters).
params: {}

# nangate45: gcd is tiny, starts at sub-ns.
#   ORFS reference uses 0.46 ns (Fmax target ~2.17 GHz).
#   AutoTuner nangate45/gcd canonical range: [0.3, 1.0] ns.
# Clock pinned to the ORFS gcd autotuner.json _SDC_CLK_PERIOD [0.3,1.0] so
# eda-rl and AutoTuner search the identical clock axis (head-to-head parity).
# asap7: no asap7 SDC shipped in this ORFS install for gcd; not used.
platforms:
  nangate45:
    clock_range_ns: [0.3, 1.0]
    default_clock_ns: 0.6

# has_macros: false — gcd is a pure std-cell design.
has_macros: false

# functional_eval: none — gcd has no behavioral simulation hook.
# F0 is legality/validate_config only; F1 is skipped (functional_eval.kind != tinyvad_sim).
functional_eval:
  kind: none

# ── Head-to-head knob parity with ORFS AutoTuner (uncommitted experiment) ──
# Mirrors flow/designs/nangate45/gcd/autotuner.json EXACTLY: the same 8 knobs
# over the same ranges, so eda-rl's search space == AutoTuner's search space
# (each expressed in its native format). Run eda-rl with --max-tier 3 so the
# tier-3 CTS_* and ROUTING_LAYER_ADJUSTMENT knobs are in scope before this
# block prunes everything AutoTuner's gcd json does not tune (incl. abc_recipe —
# AutoTuner tunes no synthesis-recipe axis).
knobs:
  exclude:
    - abc_recipe
    - CORE_UTILIZATION
    - CORE_ASPECT_RATIO
    - PLACE_DENSITY
    - DETAILED_ROUTE_END_ITERATION
    - MAX_PLACE_STEP_COEF
    - MIN_PLACE_STEP_COEF
    - RECOVER_POWER
    - SETUP_SLACK_MARGIN
    - TNS_END_PERCENT
  override:                    # ranges copied verbatim from gcd autotuner.json
    CORE_MARGIN:                        { range: [1, 3],     default: 2 }
    CELL_PAD_IN_SITES_GLOBAL_PLACEMENT: { range: [0, 3],     default: 2 }
    CELL_PAD_IN_SITES_DETAIL_PLACEMENT: { range: [0, 3],     default: 1 }
    ROUTING_LAYER_ADJUSTMENT:           { range: [0.1, 0.3], default: 0.2 }  # = _FR_LAYER_ADJUST
    PLACE_DENSITY_LB_ADDON:             { range: [0.0, 0.2], default: 0.1 }
    CTS_CLUSTER_SIZE:                   { range: [10, 200],  default: 30 }
    CTS_CLUSTER_DIAMETER:               { range: [20, 400],  default: 100 }
